<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TJW Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f6fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.3px; }
    .coach-card { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 2px solid transparent; }
    .coach-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); border-color: #0d6efd; }
    .badge { font-weight: 500; }
    .table > :not(caption) > * > * { vertical-align: middle; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container-lg">
    <a class="navbar-brand" href="/">The Job Workshop</a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="/dashboard">Founder Dashboard</a>
      <a class="btn btn-outline-secondary btn-sm" href="/settings">&#9881; Baselines</a>
    </div>
  </div>
</nav>

<div class="container-lg pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
